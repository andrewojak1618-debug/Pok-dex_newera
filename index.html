<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./js/globalState.js" defer></script>
    <script src="./js/pokemonData.js" defer></script>
    <script src="./js/templates.js" defer></script>
    <script src="./js/pokemonApi.js" defer></script>
    <script src="./js/pokemonDetails.js" defer></script>
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <main id="app" class="pokedex_shell">
      <section class="pokedex_list_panel" aria-label="Pokemon Liste">
        <form class="search_bar">
          <label class="search_label" for="pokemon_search"
            >Search your Pokemon</label
          >
          <input
            id="pokemon_search"
            class="search_input"
            type="search"
            name="pokemon_search"
          />
          <button
            class="search_button"
            type="submit"
            aria-label="Pokemon suchen"
          >
            <span></span>
          </button>
        </form>

        <div class="pokemon_grid" aria-label="Pokemon Karten">
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
          <article class="pokemon_card_placeholder"></article>
        </div>
      </section>

      <aside
        class="pokemon_detail_panel"
        aria-label="Pokemon Detailansicht"
      ></aside>
    </main>
  </body>
</html>
