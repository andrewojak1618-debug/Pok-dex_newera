<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarkDex Pokedex</title>
    <link
      rel="icon"
      type="image/png"
      href="./assets/icons/darkPok_favicon.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./css/molecules/mediaquery.css" />
    <script src="./js/globalState.js" defer></script>
    <script src="./js/templates.js" defer></script>
    <script src="./js/pokemonApi.js" defer></script>
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <header class="page_header">
      <div class="header_brand" aria-label="DarkDex">
        <img
          class="header_logo"
          src="./assets/icons/darkPok_favicon.png"
          alt="DarkDex logo"
        />
        <h1 class="page_title">DarkDex</h1>
      </div>

      <form class="search_bar">
        <label class="screen_reader_text" for="pokemon_search">
          Search your Pokemon
        </label>
        <input
          id="pokemon_search"
          class="search_input"
          data-id="search-input"
          type="search"
          name="pokemon_search"
          minlength="3"
          placeholder="Search your Pokemon"
          autocomplete="off"
        />
        <button
          class="search_button"
          data-id="search-button"
          type="submit"
          aria-label="Search Pokemon"
          disabled
        >
          <span></span>
        </button>
      </form>
    </header>

    <main id="app" data-id="content" class="pokedex_shell">
      <section class="pokedex_list_panel" aria-label="Pokemon list">
        <div
          id="pokemon_grid"
          class="pokemon_grid"
          aria-label="Pokemon cards"
        ></div>
        <div id="message_container" class="message_container"></div>
        <button
          id="load_more_button"
          class="load_more_button"
          data-id="load-more-button"
          type="button"
        >
          Load More
        </button>
      </section>

      <aside class="pokemon_detail_panel" aria-label="Pokemon details"></aside>
    </main>

    <div id="loading_screen" class="loading_screen is_hidden">
      <picture>
        <source
          srcset="./assets/icons/loading_voltball_red.webp"
          type="image/webp"
        />
        <img
          class="loading_logo"
          src="./assets/icons/loading_voltball_red_small.png"
          alt=""
        />
      </picture>
      <span>Loading Pokemon...</span>
    </div>

    <dialog id="pokemon_dialog" class="pokemon_dialog" data-id="dialog">
      <article class="dialog_card" data-id="overlay-pokemon-name">
        <button
          class="close_dialog_button"
          data-id="close-dialog-button"
          type="button"
          aria-label="Close Pokemon details"
        >
          <span></span>
        </button>

        <img
          class="dialog_pokemon_image"
          data-id="dialog-image"
          src="./assets/icons/darkPok_favicon.png"
          alt="Selected Pokemon"
        />

        <h2 class="dialog_pokemon_name">Pokemon Name</h2>
        <p class="dialog_pokemon_text">
          Stats and details will be rendered here.
        </p>

        <div class="dialog_navigation">
          <button
            class="dialog_arrow_button"
            data-id="prev-button"
            type="button"
          >
            Previous
          </button>
          <button
            class="dialog_arrow_button"
            data-id="next-button"
            type="button"
          >
            Next
          </button>
        </div>
      </article>
    </dialog>
  </body>
</html>
